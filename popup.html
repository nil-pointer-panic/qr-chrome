<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="css/popup.css">
</head>
<body>
  <div class="container">
    <!-- Top Toolbar -->
    <div class="toolbar">
      <div class="toolbar-left">
        <button class="btn-toolbar" id="btn-download" title="下载二维码" aria-label="下载二维码">
          <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        </button>
        <button class="btn-toolbar" id="btn-save" title="收藏" aria-label="收藏">
          <svg viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
        </button>
      </div>
      <div class="toolbar-right">
        <button class="btn-toolbar" id="btn-toggle-input" title="隐藏输入框" aria-label="隐藏输入框">
          <svg class="icon-eye" viewBox="0 0 24 24"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/></svg>
          <svg class="icon-eye-off" viewBox="0 0 24 24"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
        </button>
        <button class="btn-theme" id="btn-theme" title="切换主题" aria-label="切换主题">
          <svg class="icon-sun" viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
          <svg class="icon-moon" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        </button>
      </div>
    </div>
    <!-- QR Code Section -->
    <div class="section">
      <div class="input-group">
        <input type="text" id="url-input" placeholder="输入要生成二维码的地址" title="">
      </div>
      <div class="qr-wrapper">
        <canvas id="qrcode"></canvas>
      </div>
    </div>

    <!-- History Section -->
    <div class="section" id="history-section">
      <div class="history-section">
        <div class="history-header">
          <div class="history-title">收藏夹</div>
          <button class="btn-clear" id="btn-clear" title="清空" aria-label="清空收藏夹">清空</button>
        </div>
        <div class="history-list" id="history-list">
          <div class="history-empty">暂无记录</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast-container" id="toast-container">
    <div class="toast" id="toast"></div>
  </div>

  <script src="lib/qrcode.min.js"></script>
  <script src="js/popup.js"></script>
</body>
</html>
